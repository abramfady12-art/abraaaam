<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وعود الكتاب المقدس - Spin</title>
    <style>
        /* CSS: تصميم عصري مريح للعين (Glassmorphism) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .verse-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        #verse-text {
            font-size: 1.6rem;
            margin-bottom: 20px;
            line-height: 1.5;
            font-weight: 300;
        }

        #verse-ref {
            color: #4facfe; /* لون سماوي هادئ */
            font-weight: bold;
            font-size: 1.2rem;
        }

        button {
            margin-top: 35px;
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: #000;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }

        /* تأثير الدوران الـ Spin */
        .spin-anim {
            animation: spinEffect 0.6s ease-in-out;
        }

        @keyframes spinEffect {
            0% { transform: scale(1) rotateY(0deg); opacity: 1; }
            50% { transform: scale(0.8) rotateY(180deg); opacity: 0.2; }
            100% { transform: scale(1) rotateY(360deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-bottom: 25px;">آية مشجعة للشباب ✨</h2>
        
        <div class="verse-card" id="card">
            <p id="verse-text">"استعد لسماع رسالة خاصة.."</p>
            <span id="verse-ref"></span>
        </div>

        <button onclick="getNewVerse()">Spin 🎲</button>
    </div>

    <script>
        // --- هنا تضع الآيات التي حولتها من إكسيل ---
        // انسخ الـ JSON الناتج من الموقع وضعه مكان المصفوفة دي
        const myVerses = [
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"},
            {"text": "أستطيع كل شيء في المسيح الذي يقويني.", "ref": "فيلبي 4: 13"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"}
            // استمر في اللصق هنا...
        ];

        function getNewVerse() {
            const card = document.getElementById('card');
            const textEl = document.getElementById('verse-text');
            const refEl = document.getElementById('verse-ref');

            // إضافة الأنيميشن
            card.classList.add('spin-anim');

            // تغيير المحتوى في منتصف الأنيميشن
            setTimeout(() => {
                const randomVerse = myVerses[Math.floor(Math.random() * myVerses.length)];
                textEl.innerText = `"${randomVerse.text}"`;
                refEl.innerText = randomVerse.ref;
            }, 300);

            // إزالة الكلاس لتكرار الحركة
            setTimeout(() => card.classList.remove('spin-anim'), 600);
        }
    </script>
</body>
</html>
