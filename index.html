
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وعدك النهاردة - Spin Wheel</title>
    <style>
        :root {
            --gold: #ffca28;
            --main-bg: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        /* شاشة إدخال الاسم */
        #login-screen {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            margin: 20px 0;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            background: rgba(255,255,255,0.9);
            color: #333;
        }

        /* شاشة العجلة */
        #wheel-screen { display: none; flex-direction: column; align-items: center; gap: 20px; }

        .wheel-container { position: relative; margin: 10px 0; }

        .wheel-outer {
            width: 240px;
            height: 240px;
            border: 10px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #ffca28 0deg 30deg, #ffa000 30deg 60deg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 0; height: 0; 
            border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 28px solid white;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        /* تصميم الكارت ومكوناته (الاسم، الصورة، الآية) */
        .verse-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.7s;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* مسافة بين العناصر */
        }

        .verse-display.show { opacity: 1; transform: translateY(0); }

        #user-welcome { font-size: 1.4rem; color: white; font-weight: bold; margin: 0; }

        /* تنسيق الصورة */
        .worshipper-img {
            width: 100px; /* حجم الصورة */
            height: 100px;
            border-radius: 50%; /* دائرية */
            object-fit: cover; /* لقص الصورة بشكل جيد */
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #verse-text { font-size: 1.4rem; line-height: 1.5; margin: 0; font-weight: 500; }
        #verse-ref { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-top: -5px; }

        button {
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--gold);
            color: #1e3c72;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255,202,40,0.4); }
        button:disabled { background: #999; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2 style="margin-top:0;">وعدك النهاردة 💡</h2>
            <p>اكتب اسمك عشان تستقبل رسالتك</p>
            <input type="text" id="username-input" placeholder="اسمك الجميل...">
            <br>
            <button onclick="goToWheel()">يلا بينا</button>
        </div>

        <div id="wheel-screen">
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel-outer" id="wheel"></div>
            </div>
            <button onclick="spinWheel()" id="spin-btn">دَوّر العجلة 🎲</button>
            
            <div class="verse-display" id="display">
                <p id="user-welcome"></p> <img src="pope.jpg" alt="صورة الراعي/القديس" class="worshipper-img">
                
                <p id="verse-text"></p> <span id="verse-ref"></span> </div>
        </div>
    </div>

    <script>
        // مصفوفة الآيات (استبدلها بالـ JSON اللي طلع من الإكسيل)
        const myVerses = [
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"},
            {"text": "أستطيع كل شيء في المسيح الذي يقويني.", "ref": "فيلبي 4: 13"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"},
            {"text": "سلاماً أترك لكم.. سلامي أعطيكم.", "ref": "يوحنا 14: 27"},
            {"text": "الرب راعي فلا يعوزني شيء.", "ref": "مزمور 23: 1"},
            {"text": "على الله توكلت فلا أخاف.", "ref": "مزمور 56: 11"}
        ];

        let currentRotation = 0;
        let userName = "";

        function goToWheel() {
            const input = document.getElementById('username-input');
            if (input.value.trim() === "") {
                alert("اكتب اسمك الأول يا بطل!");
                return;
            }
            userName = input.value;
            // تجهيز جملة الترحيب
            document.getElementById('user-welcome').innerText = `يا ${userName}، ربنا بيقولك:`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wheel-screen').style.display = 'flex';
        }

        function spinWheel() {
            const btn = document.getElementById('spin-btn');
            const display = document.getElementById('display');
            const wheel = document.getElementById('wheel');

            btn.disabled = true;
            display.classList.remove('show'); // إخفاء الوعد القديم

            // دورات عشوائية (لفات كاملة + زاوية)
            const addedRotation = Math.floor(Math.random() * 360) + 1440; 
            currentRotation += addedRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // مدة اللفة 4 ثواني، بعدها يظهر الكارت الكامل
            setTimeout(() => {
                const randomVerse = myVerses[Math.floor(Math.random() * myVerses.length)];
                document.getElementById('verse-text').innerText = `"${randomVerse.text}"`;
                document.getElementById('verse-ref').innerText = randomVerse.ref;
                
                // إظهار الكارت الكامل (الاسم + الصورة + الآية)
                display.classList.add('show');
                btn.disabled = false;
                btn.innerText = "مرة كمان؟ 🔄";
            }, 4000);
        }
    </script>
</body>
</html>
