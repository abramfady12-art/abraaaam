<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وعدك الشخصي ✨</title>
    <style>
        :root {
            --gold: #ffca28;
            --main-bg: #000; /* خلفية سوداء تليق بالشعار */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        /* شاشة الدخول */
        #login-screen {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            margin: 20px 0;
            font-size: 1.1rem;
            text-align: center;
            background: #fff;
        }

        /* شاشة الـ Spin */
        #wheel-screen { display: none; flex-direction: column; align-items: center; gap: 20px; }

        .logo-img { width: 220px; margin-bottom: 10px; }

        /* العداد */
        .loader-container {
            width: 80%;
            display: none; /* يظهر فقط أثناء التحميل */
            flex-direction: column;
            align-items: center;
        }

        #progress-text { font-size: 2rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--gold);
            transition: width 0.1s linear;
        }

        /* كارت الآية */
        .verse-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
        }

        .verse-display.show { opacity: 1; transform: translateY(0); }

        button {
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--gold);
            color: #000;
            font-weight: 800;
            transition: 0.3s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>مرحباً بك 💡</h2>
            <input type="text" id="username-input" placeholder="اكتب اسمك هنا...">
            <br>
            <button onclick="goToWheel()">استمرار</button>
        </div>

        <div id="wheel-screen">
            <img src="149499.png" alt="Logo" class="logo-img">
            
            <div id="user-msg" style="font-size: 1.4rem; font-weight: bold;"></div>

            <div class="loader-container" id="loader">
                <div id="progress-text">0%</div>
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
            </div>

            <button onclick="startLoading()" id="spin-btn">استقبل وعدك 🎲</button>

            <div class="verse-display" id="display">
                <p id="verse-text" style="font-size: 1.5rem; line-height: 1.4;"></p>
                <span id="verse-ref" style="color: var(--gold); font-weight: bold;"></span>
            </div>
        </div>
    </div>

    <script>
        const myVerses = [
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"},
            {"text": "أستطيع كل شيء في المسيح الذي يقويني.", "ref": "فيلبي 4: 13"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"},
            {"text": "سلاماً أترك لكم.. سلامي أعطيكم.", "ref": "يوحنا 14: 27"}
        ];

        let userName = "";

        function goToWheel() {
            const input = document.getElementById('username-input');
            if (input.value.trim() === "") return alert("دخل اسمك الأول");
            userName = input.value;
            document.getElementById('user-msg').innerText = `يا ${userName}، ربنا بيقولك:`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wheel-screen').style.display = 'flex';
        }

        function startLoading() {
            const btn = document.getElementById('spin-btn');
            const loader = document.getElementById('loader');
            const progText = document.getElementById('progress-text');
            const progFill = document.getElementById('progress-fill');
            const display = document.getElementById('display');

            btn.disabled = true;
            display.classList.remove('show');
            loader.style.display = 'flex';
            
            let count = 0;
            const interval = setInterval(() => {
                count++;
                progText.innerText = count + "%";
                progFill.style.width = count + "%";

                if (count >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.display = 'none';
                        showVerse();
                        btn.disabled = false;
                        btn.innerText = "مرة أخرى 🔄";
                    }, 500);
                }
            }, 30); // السرعة: 3 ثواني تقريباً للوصول لـ 100%
        }

        function showVerse() {
            const randomVerse = myVerses[Math.floor(Math.random() * myVerses.length)];
            document.getElementById('verse-text').innerText = `"${randomVerse.text}"`;
            document.getElementById('verse-ref').innerText = randomVerse.ref;
            document.getElementById('display').classList.add('show');
        }
    </script>
</body>
</html>
