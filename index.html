<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وعد ربنا ليك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --gold-dim: rgba(201,168,76,0.15);
            --crimson: #8B1A1A;
            --crimson-dark: #5C0E0E;
            --ivory: #FAF6EE;
            --ink: #1A0F0F;
            --parchment: #F0E6CC;
            --cross-glow: rgba(201,168,76,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--ink);
            font-family: 'Amiri', serif;
            color: var(--ivory);
            overflow-x: hidden;
            position: relative;
        }

        /* --- الخلفية: نقش قبطي هندسي --- */
        #pattern-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(-45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
            background-size: 40px 40px;
        }

        /* توهج ذهبي في المنتصف */
        #center-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(139,26,26,0.25) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- الكانفس للصليب المتحرك --- */
        #cross-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        /* --- الشاشات --- */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; }
        .screen.active { display: flex; animation: rise 0.6s ease forwards; }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- رأس الصفحة (الهيدر الثابت) --- */
        .coptic-header {
            text-align: center;
            margin-bottom: 35px;
            width: 100%;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px;
            filter: drop-shadow(0 0 18px rgba(201,168,76,0.35));
        }

        .app-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .app-subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            color: rgba(250,246,238,0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* --- بانر المشاركة --- */
        .share-banner {
            margin-top: 18px;
            width: 100%;
            background: linear-gradient(135deg, rgba(139,26,26,0.35), rgba(201,168,76,0.12));
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 4px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        .share-banner.show { opacity: 1; transform: translateY(0); }

        .share-icon {
            font-size: 2rem;
            flex-shrink: 0;
            animation: bounce-icon 1.8s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .share-text-block { flex: 1; text-align: right; }
        .share-headline {
            font-family: 'Amiri', serif;
            font-size: 1.05rem;
            color: var(--gold-light);
            font-weight: 700;
            display: block;
            margin-bottom: 3px;
        }
        .share-sub {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.78rem;
            color: rgba(250,246,238,0.45);
            letter-spacing: 1px;
        }

        .btn-share {
            flex-shrink: 0;
            padding: 10px 18px;
            border: none;
            border-radius: 3px;
            background: #25D366;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 12px rgba(37,211,102,0.3);
            white-space: nowrap;
        }
        .btn-share:hover { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(37,211,102,0.45); }
        .btn-share:active { transform: translateY(0); }

        /* --- الفاصل الذهبي --- */
        .divider {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 18px auto;
        }

        /* --- بطاقة (الغلاف الزجاجي) --- */
        .card {
            background: rgba(26,15,15,0.7);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 4px;
            padding: 35px 30px;
            width: 100%;
            position: relative;
            backdrop-filter: blur(8px);
        }

        /* زاوية قبطية ديكور */
        .card::before, .card::after {
            content: '✦';
            position: absolute;
            color: var(--gold);
            opacity: 0.5;
            font-size: 1rem;
        }
        .card::before { top: 10px; right: 15px; }
        .card::after { bottom: 10px; left: 15px; }

        /* --- شاشة 1: الاسم --- */
        .greeting-text {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: var(--ivory);
            text-align: center;
            margin-bottom: 6px;
        }
        .greeting-sub {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: rgba(250,246,238,0.45);
            text-align: center;
            margin-bottom: 28px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            border-radius: 3px;
            border: 1px solid rgba(201,168,76,0.3);
            background: rgba(201,168,76,0.06);
            color: var(--ivory);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            margin-bottom: 22px;
        }
        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201,168,76,0.2);
        }
        input[type="text"]::placeholder { color: rgba(250,246,238,0.25); }

        /* --- الزرار الرئيسي --- */
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 3px;
            background: linear-gradient(135deg, var(--crimson-dark), var(--crimson));
            color: var(--gold-light);
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(139,26,26,0.4);
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(139,26,26,0.5); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 3px;
            background: transparent;
            color: var(--gold-light);
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 12px;
            transition: background 0.3s, border-color 0.3s;
        }
        .btn-secondary:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

        /* --- شاشة 2: اللودينج --- */
        .loading-cross {
            font-size: 4rem;
            color: var(--gold);
            text-shadow: 0 0 30px var(--cross-glow);
            animation: pulse-cross 1.5s ease-in-out infinite;
            margin-bottom: 25px;
        }
        @keyframes pulse-cross {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        .progress-num {
            font-family: 'Tajawal', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 15px;
        }
        .progress-label {
            font-family: 'Amiri', serif;
            font-size: 1rem;
            color: rgba(250,246,238,0.4);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(201,168,76,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--crimson), var(--gold));
            transition: width 0.1s linear;
        }

        /* --- شاشة 3: الآية --- */
        .welcome-name {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            color: rgba(250,246,238,0.6);
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .welcome-promise {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 25px;
        }

        /* الآية المعروضة */
        .verse-display {
            text-align: center;
            padding: 30px 25px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .verse-display.show { opacity: 1; transform: translateY(0); }

        .verse-book {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.75rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0.8;
        }

        .opening-quote {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--gold);
            opacity: 0.4;
            line-height: 0.5;
            display: block;
            margin-bottom: 10px;
        }

        .verse-text {
            font-family: 'Amiri', serif;
            font-size: 1.55rem;
            line-height: 1.9;
            color: var(--ivory);
            font-style: italic;
        }

        .verse-ref {
            display: inline-block;
            margin-top: 20px;
            padding: 6px 18px;
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 2px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 1px;
        }

        /* رقم الآية */
        .verse-number-badge {
            position: absolute;
            top: 10px;
            left: 15px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.7rem;
            color: rgba(201,168,76,0.35);
            letter-spacing: 1px;
        }

        /* أزرار الشاشة 3 */
        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }
        .btn-row .btn-primary { flex: 1; font-size: 1rem; padding: 13px; }
        .btn-row .btn-secondary { flex: 1; font-size: 1rem; padding: 13px; margin-top: 0; }

        /* شاشة الآية الثابتة (من الـ URL) */
        #screen-fixed .card { border-color: rgba(201,168,76,0.5); }
        .fixed-badge {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 20px;
            text-align: center;
        }

        /* فوتر */
        .coptic-footer {
            margin-top: 30px;
            text-align: center;
        }
        .footer-cross { color: var(--gold); opacity: 0.3; font-size: 1.2rem; letter-spacing: 6px; }
        .footer-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.7rem;
            color: rgba(250,246,238,0.2);
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-title { font-size: 1.6rem; }
            .verse-text { font-size: 1.3rem; }
            .card { padding: 25px 18px; }
        }
    </style>
</head>
<body>

<div id="pattern-bg"></div>
<div id="center-glow"></div>
<canvas id="cross-canvas"></canvas>

<div class="container">

    <!-- هيدر ثابت لكل الشاشات -->
    <div class="coptic-header">
        <img src="WhatsApp Image 2026-03-02 at 12.34.34 AM.jpeg" alt="شعار الفريق" class="logo-img">
        <div class="app-title">وعد ربنا ليك</div>
        <div class="app-subtitle">كلمة الله · إكليسيا</div>
        <div class="divider"></div>
    </div>

    <!-- ===== شاشة الآية الثابتة (URL param) ===== -->
    <div id="screen-fixed" class="screen" style="display:none;">
        <div class="card">
            <div class="fixed-badge">✦ وعد خاص بيك ✦</div>
            <div class="verse-display show" id="fixed-verse-content">
                <div class="verse-book" id="fixed-book"></div>
                <span class="opening-quote">"</span>
                <p class="verse-text" id="fixed-verse-text"></p>
                <div class="verse-ref" id="fixed-verse-ref"></div>
                <div class="verse-number-badge" id="fixed-verse-num"></div>
            </div>
        </div>
        <div class="btn-row" style="margin-top:20px; max-width:520px; width:100%;">
            <button class="btn-primary" onclick="goRandom()">آية عشوائية 🎲</button>
            <button class="btn-secondary" onclick="goHome()">الرئيسية</button>
        </div>

        <!-- بانر المشاركة -->
        <div class="share-banner show" id="share-banner-fixed">
            <div class="share-text-block">
                <span class="share-headline">📸 خد سكرين شوت!</span>
                <span class="share-sub">شاركنا باللي طلعلك في ستوري واتساب 🤍</span>
            </div>
            <span class="share-icon">📱</span>
        </div>
    </div>

    <!-- ===== شاشة 1: الدخول ===== -->
    <div id="screen-1" class="screen active">
        <div class="card">
            <p class="greeting-text">أهلاً بيك يا بطل 🕊️</p>
            <p class="greeting-sub">ربنا عنده وعد خاص بيك النهارده</p>
            <input type="text" id="username-input" placeholder="اكتب اسمك هنا...">
            <button class="btn-primary" onclick="startApp()">دخول النظام ☩</button>
        </div>
        <button class="btn-secondary" style="max-width:520px; margin-top:15px;" onclick="showRandom()">
            آية عشوائية بدون دخول
        </button>
    </div>

    <!-- ===== شاشة 2: اللودينج ===== -->
    <div id="screen-2" class="screen">
        <div class="loading-cross">☩</div>
        <div class="progress-num" id="progress-text">0%</div>
        <div class="progress-label">جاري التحضير...</div>
        <div class="progress-track" style="width:280px;">
            <div id="progress-fill"></div>
        </div>
    </div>

    <!-- ===== شاشة 3: الآية العشوائية ===== -->
    <div id="screen-3" class="screen">
        <div class="card" style="position:relative;">
            <div class="verse-number-badge" id="main-verse-num"></div>
            <p class="welcome-name" id="welcome-name-txt"></p>
            <p class="welcome-promise">ربنا بيقولك... 🕊️</p>
            <div class="verse-display show" id="verse-display">
                <div class="verse-book" id="verse-book"></div>
                <span class="opening-quote">"</span>
                <p class="verse-text" id="verse-text"></p>
                <div class="verse-ref" id="verse-ref"></div>
            </div>
        </div>
        <div class="btn-row" style="max-width:520px;">
            <button class="btn-primary" onclick="newRandom()">آية تانية 🎲</button>
            <button class="btn-secondary" onclick="goHome()">رجوع</button>
        </div>

        <!-- بانر المشاركة -->
        <div class="share-banner" id="share-banner-3">
            <div class="share-text-block">
                <span class="share-headline">📸 خد سكرين شوت!</span>
                <span class="share-sub">شاركنا باللي طلعلك في ستوري واتساب 🤍</span>
            </div>
            <span class="share-icon">📱</span>
        </div>
    </div>

    <div class="coptic-footer">
        <div class="footer-cross">☩ ✦ ☩</div>
        <div class="footer-text">كلمته تثبت إلى الأبد</div>
    </div>

</div>

<script>
// ============================================================
// قاعدة الآيات - ترجمة AVD (فان دايك)
// أضف آياتك هنا. الـ index (بيبدأ من 1) هو رقم الـ URL.
// مثال: موقعك.com/index.html?v=5 → بيفتح الآية رقم 5
// ============================================================
const verses = [
    // ← index 0 (محجوز، مش بيتعرضش)
    null,
    // index 1
    { book: "يوحنا", text: "سَلاَمًا أَتْرُكُ لَكُمْ. سَلاَمِي أُعْطِيكُمْ، لَيْسَ كَمَا يُعْطِي الْعَالَمُ أُعْطِيكُمْ.", ref: "يوحنا 14: 27" },
    // index 2
    { book: "مزامير", text: "اَلرَّبُّ نُورِي وَخَلاَصِي، مِمَّنْ أَخَافُ؟ اَلرَّبُّ حِصْنُ حَيَاتِي، مِمَّنْ أَرْتَعِبُ؟", ref: "مزمور 27: 1" },
    // index 3
    { book: "فيلبي", text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4: 13" },
    // index 4
    { book: "إشعياء", text: "لاَ تَخَفْ لأَنِّي مَعَكَ، لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. أَنَا أَشَدَّدْتُكَ وَأَعَنْتُكَ.", ref: "إشعياء 41: 10" },
    // index 5
    { book: "إرميا", text: "إِنِّي أَعْرِفُ الأَفْكَارَ الَّتِي أَنَا مُفَتَّكِرٌ بِهَا عَنْكُمْ يَقُولُ الرَّبُّ، أَفْكَارَ سَلاَمٍ لاَ شَرًّا.", ref: "إرميا 29: 11" },
    // index 6
    { book: "مزامير", text: "طَرِيقُ اللهِ كَامِلٌ، كَلاَمُ الرَّبِّ مُصَفَّى. هُوَ تُرْسٌ لِكُلِّ الْمُتَّكِلِينَ عَلَيْهِ.", ref: "مزمور 18: 30" },
    // index 7
    { book: "رومية", text: "وَنَعْلَمُ أَنَّ كُلَّ الأَشْيَاءِ تَعْمَلُ مَعًا لِلْخَيْرِ لِلَّذِينَ يُحِبُّونَ اللهَ.", ref: "رومية 8: 28" },
    // index 8
    { book: "مزامير", text: "أُلْقِ عَلَى الرَّبِّ هَمَّكَ فَهُوَ يَعُولُكَ. لَنْ يَدَعَ الصِّدِّيقَ يَتَزَعْزَعُ إِلَى الأَبَدِ.", ref: "مزمور 55: 22" },
    // index 9
    { book: "يشوع", text: "أَلَمْ أُوصِكَ؟ تَشَدَّدْ وَتَشَجَّعْ. لاَ تَرْهَبْ وَلاَ تَخَفْ، لأَنَّ الرَّبَّ إِلهَكَ مَعَكَ.", ref: "يشوع 1: 9" },
    // index 10
    { book: "متى", text: "تَعَالَوْا إِلَيَّ يَا جَمِيعَ الْمُتْعَبِينَ وَالثَّقِيلِي الأَحْمَالِ، وَأَنَا أُرِيحُكُمْ.", ref: "متى 11: 28" },
    // index 11

// ============================================================
// منطق التطبيق
// ============================================================

let userName = '';
let lastVerseIndex = -1;

// --- تحقق من URL Param عند التحميل ---
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const v = params.get('v');
    if (v !== null) {
        const idx = parseInt(v);
        showFixedVerse(idx);
    }
    initCanvas();
});

function showFixedVerse(idx) {
    const verse = (idx >= 1 && idx < verses.length) ? verses[idx] : null;
    if (!verse) {
        // رقم غير موجود → عرض عشوائي
        showRandom();
        return;
    }
    // إخفاء كل الشاشات وإظهار شاشة الآية الثابتة
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const fixedScreen = document.getElementById('screen-fixed');
    fixedScreen.style.display = 'flex';
    fixedScreen.classList.add('active');

    document.getElementById('fixed-book').textContent = `✦ ${verse.book} ✦`;
    document.getElementById('fixed-verse-text').textContent = verse.text;
    document.getElementById('fixed-verse-ref').textContent = verse.ref;
    document.getElementById('fixed-verse-num').textContent = `#${idx}`;
}

function startApp() {
    const input = document.getElementById('username-input').value.trim();
    if (!input) { alert('اكتب اسمك الأول 🙏'); return; }
    userName = input;
    navTo(2);
}

function showRandom() {
    navTo(3);
    loadRandomVerse();
}

function navTo(num) {
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.style.display = '';
    });
    document.getElementById('screen-fixed').style.display = 'none';

    if (num === 2) {
        document.getElementById('screen-2').classList.add('active');
        startLoading();
    } else if (num === 1) {
        document.getElementById('screen-1').classList.add('active');
    } else if (num === 3) {
        document.getElementById('screen-3').classList.add('active');
    }
}

function startLoading() {
    let count = 0;
    const interval = setInterval(() => {
        count++;
        document.getElementById('progress-text').textContent = count + '%';
        document.getElementById('progress-fill').style.width = count + '%';
        if (count >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                navTo(3);
                loadRandomVerse();
            }, 500);
        }
    }, 22);
}

function loadRandomVerse() {
    // اختار آية غير المعروضة قبلها
    const available = verses.slice(1).map((v, i) => i + 1).filter(i => verses[i] !== null);
    let idx;
    do { idx = available[Math.floor(Math.random() * available.length)]; }
    while (idx === lastVerseIndex && available.length > 1);
    lastVerseIndex = idx;

    const verse = verses[idx];
    if (userName) {
        document.getElementById('welcome-name-txt').textContent = `يا ${userName}...`;
    } else {
        document.getElementById('welcome-name-txt').textContent = '';
    }
    document.getElementById('verse-book').textContent = `✦ ${verse.book} ✦`;
    document.getElementById('verse-text').textContent = verse.text;
    document.getElementById('verse-ref').textContent = verse.ref;
    document.getElementById('main-verse-num').textContent = `#${idx}`;

    // إظهار بـ animation
    const display = document.getElementById('verse-display');
    display.classList.remove('show');
    const banner = document.getElementById('share-banner-3');
    if (banner) banner.classList.remove('show');
    setTimeout(() => {
        display.classList.add('show');
        setTimeout(() => { if (banner) banner.classList.add('show'); }, 600);
    }, 50);
}

function newRandom() {
    loadRandomVerse();
}

function goRandom() {
    document.getElementById('screen-fixed').style.display = 'none';
    document.getElementById('screen-fixed').classList.remove('active');
    navTo(3);
    loadRandomVerse();
}

function goHome() {
    document.getElementById('screen-fixed').style.display = 'none';
    document.getElementById('screen-fixed').classList.remove('active');
    navTo(1);
}

// ============================================================
// خلفية الصلبان المتحركة
// ============================================================
function initCanvas() {
    const canvas = document.getElementById('cross-canvas');
    const ctx = canvas.getContext('2d');
    let crosses = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class FloatingCross {
        constructor() { this.reset(true); }
        reset(init = false) {
            this.x = Math.random() * canvas.width;
            this.y = init ? Math.random() * canvas.height : canvas.height + 30;
            this.size = Math.random() * 18 + 8;
            this.speed = Math.random() * 0.4 + 0.15;
            this.opacity = Math.random() * 0.4 + 0.1;
            this.drift = (Math.random() - 0.5) * 0.3;
        }
        update() {
            this.y -= this.speed;
            this.x += this.drift;
            if (this.y < -30) this.reset();
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = '#C9A84C';
            ctx.font = `${this.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☩', this.x, this.y);
            ctx.restore();
        }
    }

    for (let i = 0; i < 25; i++) crosses.push(new FloatingCross());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        crosses.forEach(c => { c.update(); c.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
}
</script>
