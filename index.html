<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الوعود - Pro Edition</title>
    <style>
        :root {
            --gold: #ffca28;
            --main-bg: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--main-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الكانفس المسؤول عن الخطوط المتحركة في الخلفية */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* خلف العناصر */
            pointer-events: none;
        }

        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 500px; 
            position: relative;
            z-index: 10; /* فوق الخلفية */
        }

        .screen { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease; }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input {
            width: 80%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            margin: 20px 0; font-size: 1.2rem; text-align: center; outline: none;
            background: rgba(255,255,255,0.1); color: white;
        }

        .logo-img { width: 250px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,202,40,0.3)); }
        #progress-text { font-size: 3rem; font-weight: bold; color: var(--gold); }
        .progress-bar-bg { width: 80%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--gold); }

        .wheel-container { position: relative; margin: 20px 0; }
        .wheel-outer {
            width: 280px; height: 280px; border: 10px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #ffca28 0deg 90deg, #ffa000 90deg 180deg, #ffca28 180deg 270deg, #ffa000 270deg 360deg);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            position: relative;
        }

        .wheel-label { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: 900; color: #000; font-size: 1.1rem; }
        .label-1 { transform: rotate(45deg) translateY(20px); }
        .label-2 { transform: rotate(135deg) translateY(20px); }
        .label-3 { transform: rotate(225deg) translateY(20px); }
        .label-4 { transform: rotate(315deg) translateY(20px); }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 0; height: 0; 
            border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 28px solid white;
        }

        .verse-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 15px; opacity: 0; transform: translateY(15px);
            transition: 0.7s; width: 100%;
        }
        .verse-card.show { opacity: 1; transform: translateY(0); }

        button {
            padding: 15px 45px; font-size: 1.2rem; cursor: pointer; border: none;
            border-radius: 50px; background: var(--gold); color: #000;
            font-weight: 800; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,202,40,0.2);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div id="screen-1" class="screen active">
            <h2>أهلاً بك يا بطل ✨</h2>
            <input type="text" id="username-input" placeholder="اسمك هنا...">
            <button onclick="navTo(2)">دخول النظام</button>
        </div>

        <div id="screen-2" class="screen">
            <img src="WhatsApp Image 2026-03-02 at 12.34.34 AM.jpeg" alt="شعار الإدارة" class="logo-img">
            <div id="progress-text">0%</div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="screen-3" class="screen">
            <div id="welcome-msg" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;"></div>
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel-outer" id="wheel">
                    <div class="wheel-label label-1">يوحنا</div>
                    <div class="wheel-label label-2">مزامير</div>
                    <div class="wheel-label label-3">فيلبي</div>
                    <div class="wheel-label label-4">إشعياء</div>
                </div>
            </div>
            <button onclick="spinNow()" id="spin-btn">دَوّر العجلة 🎲</button>
            <div class="verse-card" id="verse-display">
                <p id="verse-text" style="font-size: 1.5rem; line-height: 1.4;"></p>
                <span id="verse-ref" style="color: var(--gold); font-weight: bold;"></span>
            </div>
        </div>
    </div>

    <script>
        // --- كود الخلفية المتحركة (360 درجة) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class BackgroundLine {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.length = Math.random() * 150 + 50;
                this.speed = Math.random() * 1 + 0.5; // السرعة
                this.angle = Math.random() * Math.PI * 2; // زاوية التحرك 360 درجة
                this.opacity = Math.random() * 0.3 + 0.1; // شفافية الخطوط
            }
            update() {
                // تحريك الخط بناءً على الزاوية
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // لو الخط طلع بره الشاشة يرجع من الناحية التانية
                if (this.x < -200) this.x = canvas.width + 200;
                if (this.x > canvas.width + 200) this.x = -200;
                if (this.y < -200) this.y = canvas.height + 200;
                if (this.y > canvas.height + 200) this.y = -200;
            }
            draw() {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(150, 150, 150, ${this.opacity})`; // لون رمادي خفيف
                ctx.lineWidth = 1;
                ctx.moveTo(this.x, this.y);
                // رسم الخط في اتجاه حركته
                ctx.lineTo(
                    this.x + Math.cos(this.angle) * this.length, 
                    this.y + Math.sin(this.angle) * this.length
                );
                ctx.stroke();
            }
        }

        // إنشاء 50 خط في الخلفية
        for (let i = 0; i < 50; i++) {
            lines.push(new BackgroundLine());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lines.forEach(line => {
                line.update();
                line.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- منطق التطبيق (الأسامي والآيات) ---
        const versesMap = [
            {"text": "سلاماً أترك لكم.. سلامي أعطيكم.", "ref": "يوحنا 14: 27"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"},
            {"text": "أستطيع كل شيء في المسيح الذي يُقويني.", "ref": "فيلبي 4: 13"},
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"}
        ];

        let currentRotation = 0;

        function navTo(screenNum) {
            const input = document.getElementById('username-input');
            if (input.value.trim() === "") return alert("ادخل اسمك أولاً");
            document.getElementById('screen-1').classList.remove('active');
            document.getElementById('screen-2').classList.add('active');
            startLoading();
        }

        function startLoading() {
            let count = 0;
            const interval = setInterval(() => {
                count++;
                document.getElementById('progress-text').innerText = count + "%";
                document.getElementById('progress-fill').style.width = count + "%";
                if (count >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('screen-2').classList.remove('active');
                        document.getElementById('screen-3').classList.add('active');
                        document.getElementById('welcome-msg').innerText = `يا ${document.getElementById('username-input').value}، ربنا بيقولك:`;
                    }, 600);
                }
            }, 30);
        }

        function spinNow() {
            const btn = document.getElementById('spin-btn');
            const wheel = document.getElementById('wheel');
            const display = document.getElementById('verse-display');
            btn.disabled = true;
            display.classList.remove('show');

            const randomExtra = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + randomExtra; 
            currentRotation += totalSpin;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = (360 - (currentRotation % 360)) % 360;
                let selectedIndex = Math.floor(actualDeg / 90);
                const selectedVerse = versesMap[selectedIndex];
                document.getElementById('verse-text').innerText = `"${selectedVerse.text}"`;
                document.getElementById('verse-ref').innerText = selectedVerse.ref;
                display.classList.add('show');
                btn.disabled = false;
                btn.innerText = "لف تاني؟ 🔄";
            }, 4000);
        }
    </script>
</body>
</html>
