<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الوعود الشخصي</title>
    <style>
        :root {
            --gold: #ffca28;
            --main-bg: #000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        /* شاشة 1: إدخال الاسم */
        #screen-name {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شاشة 2: اللوجو والعداد */
        #screen-logo {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        /* شاشة 3: الآية */
        #screen-verse {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .logo-img { width: 250px; margin-bottom: 20px; }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            margin: 20px 0;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        /* تنسيق العداد */
        #progress-text {
            font-size: 3rem;
            font-weight: bold;
            color: var(--gold);
            margin: 10px 0;
        }

        .progress-bar-bg {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--gold);
        }

        /* تنسيق كارت الآية */
        .verse-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255, 202, 40, 0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #verse-text { font-size: 1.6rem; line-height: 1.5; margin-bottom: 15px; }
        #verse-ref { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--gold);
            color: #000;
            font-weight: 800;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-name">
            <h2 style="margin-bottom: 10px;">أهلاً بك يا بطل</h2>
            <p style="opacity: 0.8;">اكتب اسمك للبدء</p>
            <input type="text" id="username-input" placeholder="اسمك هنا...">
            <button onclick="showLogoScreen()">دخول النظام</button>
        </div>

        <div id="screen-logo">
            <img src="WhatsApp Image 2026-03-02 at 12.34.34 AM.jpeg" alt="شعار الإدارة" class="logo-img">
            <div id="loading-msg" style="font-size: 1.1rem; margin-bottom: 10px;">جاري استخراج الوعد...</div>
            <div id="progress-text">0%</div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="screen-verse">
            <div id="welcome-msg" style="font-size: 1.5rem; margin-bottom: 20px; font-weight: bold;"></div>
            <div class="verse-card">
                <p id="verse-text"></p>
                <span id="verse-ref"></span>
            </div>
            <br>
            <button onclick="resetApp()">مرة أخرى 🔄</button>
        </div>

    </div>

    <script>
        // مصفوفة الآيات (يمكنك استبدالها بالـ JSON الخاص بك)
        const myVerses = [
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"},
            {"text": "أستطيع كل شيء في المسيح الذي يقويني.", "ref": "فيلبي 4: 13"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"},
            {"text": "سلاماً أترك لكم.. سلامي أعطيكم.", "ref": "يوحنا 14: 27"}
        ];

        let userName = "";

        // الانتقال للصفحة الثانية (اللوجو) وبدء العداد
        function showLogoScreen() {
            const input = document.getElementById('username-input');
            if (input.value.trim() === "") {
                alert("من فضلك ادخل اسمك أولاً");
                return;
            }
            userName = input.value;
            
            document.getElementById('screen-name').style.display = 'none';
            document.getElementById('screen-logo').style.display = 'flex';
            
            startCounter();
        }

        // منطق العداد من 0 لـ 100
        function startCounter() {
            let count = 0;
            const progText = document.getElementById('progress-text');
            const progFill = document.getElementById('progress-fill');

            const interval = setInterval(() => {
                count++;
                progText.innerText = count + "%";
                progFill.style.width = count + "%";

                if (count >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        showVerseScreen();
                    }, 600);
                }
            }, 30); // السرعة الإجمالية حوالي 3 ثواني
        }

        // الانتقال للصفحة الثالثة (الآية)
        function showVerseScreen() {
            document.getElementById('screen-logo').style.display = 'none';
            document.getElementById('screen-verse').style.display = 'flex';
            
            // تحديث رسالة الترحيب باسم المستخدم
            document.getElementById('welcome-msg').innerText = `يا ${userName}، ربنا بيقولك:`;
            
            // اختيار آية عشوائية
            const randomVerse = myVerses[Math.floor(Math.random() * myVerses.length)];
            document.getElementById('verse-text').innerText = `"${randomVerse.text}"`;
            document.getElementById('verse-ref').innerText = randomVerse.ref;
        }

        // إعادة تشغيل النظام
        function resetApp() {
            document.getElementById('screen-verse').style.display = 'none';
            document.getElementById('screen-name').style.display = 'flex';
            document.getElementById('username-input').value = "";
            document.getElementById('progress-fill').style.width = "0%";
            document.getElementById('progress-text').innerText = "0%";
        }
    </script>
</body>
</html>
