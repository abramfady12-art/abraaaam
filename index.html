<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>نظام الكشف الضوئي المتقدم</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4af37; 
            --accent-color: #2ecc71;  
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        /* --- شاشة التحميل (Splash Screen) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        .splash-logo {
            width: 250px;
            max-width: 70%;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .loader-container {
            width: 280px;
            text-align: center;
        }

        .loading-text {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            border: 1px solid #333;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #d4af37);
            box-shadow: 0 0 10px var(--primary-color);
        }

        .percentage {
            margin-top: 15px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        /* --- الواجهة الرئيسية (Main UI) --- */
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .official-header {
            width: 100%;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.15) 0%, transparent 100%);
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .main-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary-color);
            margin: 0;
        }

        .sub-title {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-top: 5px;
        }

        .viewer-container {
            position: relative;
            width: 90%;
            max-width: 450px;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border: 2px solid #333;
            background: #000;
        }

        video { display: none; }
        canvas { display: block; width: 100%; height: auto; }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(46, 204, 113, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(46, 204, 113, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        .controls-panel {
            width: 85%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #2a2a2a;
        }

        .control-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #aaa; }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
        }

        .buttons-row { display: flex; gap: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-family: 'Tajawal';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main { background: var(--primary-color); color: #000; }
        .btn-outline { background: #222; border: 1px solid var(--accent-color); color: var(--accent-color); }
        .btn-outline.active { background: var(--accent-color); color: white; }

        #ui-controls { display: none; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="https://i.ibb.co/L6VvCWh/image.png" alt="Official Logo" class="splash-logo">
    <div class="loader-container">
        <div class="loading-text">نظام المسح المتقدم.. جاري التحميل</div>
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <div class="percentage" id="percent-text">0%</div>
    </div>
</div>

<div id="main-content">
    <div class="official-header">
        <h1 class="main-title">الإدارة العامة لمكافحة....</h1>
        <div class="sub-title">نظام الكشف الضوئي المتقدم ✨</div>
    </div>

    <div class="viewer-container">
        <div class="scan-overlay"></div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <button id="start-btn" class="btn-main" style="width: 200px; margin-bottom: 20px;" onclick="startCamera()">ابدأ المسح الضوئي</button>

    <div class="controls-panel" id="ui-controls">
        <div class="control-group">
            <label>قوة التباين (Contrast)</label>
            <input type="range" id="contrast" min="0" max="150" value="80">
        </div>

        <div class="control-group">
            <label>عزل الخلفية (Threshold)</label>
            <input type="range" id="threshold" min="0" max="255" value="128">
        </div>

        <div class="buttons-row">
            <button id="edge-btn" class="btn-outline" onclick="toggleEdge()">رؤية الحواف</button>
            <button class="btn-outline" style="border-color: #444; color: #888;" onclick="location.reload()">خروج</button>
        </div>
    </div>
</div>

<script>
    // --- عداد التحميل ---
    window.addEventListener('DOMContentLoaded', () => {
        let count = 0;
        const progressFill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-text');
        const splash = document.getElementById('splash-screen');
        const main = document.getElementById('main-content');

        const speed = 30; // 30ms * 100 = 3000ms (3 ثواني)
        
        const timer = setInterval(() => {
            count++;
            progressFill.style.width = count + "%";
            percentText.innerText = count + "%";

            if (count >= 100) {
                clearInterval(timer);
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 800);
            }
        }, speed);
    });

    // --- نظام الكاميرا ---
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d", { alpha: false });
    let contrastSlider = document.getElementById("contrast");
    let thresholdSlider = document.getElementById("threshold");
    let edgeBtn = document.getElementById("edge-btn");
    let edgeMode = false;

    function toggleEdge(){
        edgeMode = !edgeMode;
        edgeBtn.classList.toggle('active');
    }

    async function startCamera(){
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('ui-controls').style.display = 'block';

            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                processFrame();
            }
        } catch (err) {
            alert("يرجى السماح بالوصول للكاميرا لتشغيل النظام.");
        }
    }

    function processFrame(){
        if (video.paused || video.ended) return;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imageData.data;
        
        let contrast = parseInt(contrastSlider.value);
        let threshold = parseInt(thresholdSlider.value);
        let factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

        for(let i=0; i<data.length; i+=4){
            let gray = 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
            gray = factor * (gray - 128) + 128;

            if(edgeMode){
                gray = Math.abs(gray - 128) * 2.5; 
            } else {
                gray = gray > threshold ? 255 : 0;
            }
            data[i] = data[i+1] = data[i+2] = gray;
        }
        ctx.putImageData(imageData, 0, 0);
        requestAnimationFrame(processFrame);
    }
</script>

</body>
</html>
