<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وعودك الشخصية - Spin Wheel</title>
    <style>
        :root {
            --gold: #ffca28;
            --main-bg: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        /* شاشة إدخال الاسم */
        #login-screen {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            margin: 20px 0;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        /* شاشة العجلة (مخفية في البداية) */
        #wheel-screen { display: none; flex-direction: column; align-items: center; gap: 20px; }

        .wheel-container { position: relative; margin: 20px 0; }

        .wheel-outer {
            width: 250px;
            height: 250px;
            border: 8px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #ffca28 0deg 30deg, #ffa000 30deg 60deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 3.5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid white;
        }

        .verse-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
        }

        .verse-display.show { opacity: 1; transform: translateY(0); }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--gold);
            color: #1e3c72;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background: #fff; }
        
        #user-welcome { font-size: 1.5rem; margin-bottom: 10px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>أهلاً بك يا بطل ✨</h2>
            <p>اكتب اسمك عشان تستقبل وعدك</p>
            <input type="text" id="username-input" placeholder="اسمك هنا...">
            <br>
            <button onclick="goToWheel()">استمرار</button>
        </div>

        <div id="wheel-screen">
            <div id="user-welcome"></div>
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel-outer" id="wheel"></div>
            </div>
            <button onclick="spinWheel()" id="spin-btn">Spin 🎲</button>
            
            <div class="verse-display" id="display">
                <p id="verse-text"></p>
                <span id="verse-ref"></span>
            </div>
        </div>
    </div>

    <script>
        // هنا تحط الـ JSON اللي حولته من إكسيل
        const myVerses = [
            {"text": "لا تخف لأني معك. لا تتلفت لأني إلهك.", "ref": "إشعياء 41: 10"},
            {"text": "أستطيع كل شيء في المسيح الذي يقويني.", "ref": "فيلبي 4: 13"},
            {"text": "الرب نوري وخلاصي ممن أخاف؟", "ref": "مزمور 27: 1"},
            {"text": "سلاماً أترك لكم.. سلامي أعطيكم.", "ref": "يوحنا 14: 27"},
            {"text": "الرب راعي فلا يعوزني شيء.", "ref": "مزمور 23: 1"}
        ];

        let currentRotation = 0;
        let userName = "";

        function goToWheel() {
            const input = document.getElementById('username-input');
            if (input.value.trim() === "") {
                alert("من فضلك دخل اسمك الأول");
                return;
            }
            userName = input.value;
            document.getElementById('user-welcome').innerText = `يا ${userName}، الرب بيقولك:`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wheel-screen').style.display = 'flex';
        }

        function spinWheel() {
            const btn = document.getElementById('spin-btn');
            const display = document.getElementById('display');
            const wheel = document.getElementById('wheel');

            btn.disabled = true;
            display.classList.remove('show');

            const addedRotation = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += addedRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const randomVerse = myVerses[Math.floor(Math.random() * myVerses.length)];
                document.getElementById('verse-text').innerText = `"${randomVerse.text}"`;
                document.getElementById('verse-ref').innerText = randomVerse.ref;
                
                display.classList.add('show');
                btn.disabled = false;
            }, 3500);
        }
    </script>
</body>
</html>
